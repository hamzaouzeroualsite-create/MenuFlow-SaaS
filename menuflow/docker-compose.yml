services:
  postgres:
    image: postgres:16-alpine
    container_name: menuflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: menuflow
      POSTGRES_PASSWORD: menuflow_secret
      POSTGRES_DB: menuflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menuflow -d menuflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: menuflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: menuflow-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://menuflow:menuflow_secret@postgres:5432/menuflow?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      API_PORT: 4000
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: menuflow-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_WS_URL: http://api:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
